<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Strava Coach AI</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="landing">
    <h1 class="landing__title"><span class="landing__title-hi">Your</span><br>Training,<br>Analyzed.</h1>
    <p class="landing__subtitle">AI coaching built on your Strava data and recovery.</p>

    <a id="strava-login-btn" href="#" class="btn-strava">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/>
      </svg>
      Connect with Strava
    </a>

    <ul class="landing__features" aria-label="Features">
      <li>— Analyzes pace, load &amp; recovery across 90 days</li>
      <li>— Honest coaching feedback from Claude AI</li>
      <li>— Your data stays private, never stored</li>
    </ul>
  </main>

  <script>
    (function () {
      const CLIENT_ID = '{{STRAVA_CLIENT_ID}}'; // replaced at build time if using env injection
      // Fallback: read from meta or use a known placeholder that will be set via Netlify env
      // The actual client_id is fetched from the server to avoid exposing it in source.
      // We call a lightweight function to get the auth URL.
      document.getElementById('strava-login-btn').addEventListener('click', async function (e) {
        e.preventDefault();
        this.textContent = 'Connecting…';
        this.style.pointerEvents = 'none';
        try {
          const res = await fetch('/api/strava-auth');
          const data = await res.json();
          if (!res.ok || !data.url) {
            throw new Error(data.error || 'No URL returned');
          }
          window.location.href = data.url;
        } catch (err) {
          console.error(err);
          this.innerHTML = `
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
              <path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/>
            </svg>
            Connect with Strava`;
          this.style.pointerEvents = '';
          alert('Could not reach server. Check your Vercel environment variables.');
        }
      });
    })();
  </script>
</body>
</html>
