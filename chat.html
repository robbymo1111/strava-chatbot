<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Coach AI — Strava Chatbot</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="chat-layout">

    <!-- Header -->
    <header class="chat-header">
      <div class="chat-header__avatar" id="header-avatar">🏃</div>
      <div class="chat-header__info">
        <div class="chat-header__name" id="header-name">AI Coach</div>
        <div class="chat-header__status">online</div>
      </div>
      <button class="chat-header__memory" id="memory-btn" aria-label="View coach memory">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true">
          <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.44-4.16Z"/>
          <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.44-4.16Z"/>
        </svg>
        <span class="memory-dot" id="memory-dot" hidden></span>
      </button>
      <button class="chat-header__logout" id="logout-btn" aria-label="Log out">Log out</button>
    </header>

    <!-- Memory modal -->
    <div class="memory-modal" id="memory-modal" aria-hidden="true">
      <div class="memory-modal__backdrop" id="memory-backdrop"></div>
      <div class="memory-modal__sheet" role="dialog" aria-label="Coach memory">
        <div class="memory-modal__handle"></div>
        <div class="memory-modal__header">
          <span class="memory-modal__title">Coach Memory</span>
          <button class="memory-modal__close" id="memory-close">Done</button>
        </div>

        <!-- Tabs -->
        <div class="mem-tabs">
          <button class="mem-tab active" data-tab="profile">Profile</button>
          <button class="mem-tab" data-tab="paces">Paces</button>
          <button class="mem-tab" data-tab="weekly">Weekly</button>
          <button class="mem-tab" data-tab="load">Load</button>
          <button class="mem-tab" data-tab="fitness">Fitness</button>
          <button class="mem-tab" data-tab="log">Log</button>
          <button class="mem-tab" data-tab="raceprep">Race Prep</button>
          <button class="mem-tab" data-tab="gear">Gear</button>
        </div>

        <!-- Profile tab -->
        <div class="mem-tab-panel" id="tab-profile">
          <p class="memory-modal__hint">Mention PRs, goals, or injuries in chat — your coach saves them automatically.</p>
          <div class="memory-modal__body" id="memory-body"></div>
          <button class="memory-modal__clear" id="memory-clear">Clear all memory</button>
        </div>

        <!-- Training Paces tab -->
        <div class="mem-tab-panel" id="tab-paces" hidden>
          <p class="memory-modal__hint">Enter a recent race to calculate your VDOT and personalised training paces. Also predicts future race times.</p>
          <div id="vdot-section"></div>
        </div>

        <!-- Weekly Summary tab -->
        <div class="mem-tab-panel" id="tab-weekly" hidden>
          <div id="tab-weekly-content"><div class="tab-loading">Loading…</div></div>
        </div>

        <!-- Training Load tab -->
        <div class="mem-tab-panel" id="tab-load" hidden>
          <div id="tab-load-content"><div class="tab-loading">Loading…</div></div>
        </div>

        <!-- Fitness tab -->
        <div class="mem-tab-panel" id="tab-fitness" hidden>
          <div id="tab-fitness-content"><div class="tab-loading">Loading…</div></div>
        </div>

        <!-- Workout Log tab -->
        <div class="mem-tab-panel" id="tab-log" hidden>
          <div id="tab-log-content"><div class="tab-loading">Loading…</div></div>
        </div>

        <!-- Race Prep tab -->
        <div class="mem-tab-panel" id="tab-raceprep" hidden>
          <div id="tab-raceprep-content"><div class="tab-loading">Loading…</div></div>
        </div>

        <!-- Gear tab -->
        <div class="mem-tab-panel" id="tab-gear" hidden>
          <div id="tab-gear-content"><div class="tab-loading">Loading…</div></div>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <section class="chat-messages" id="chat-messages" aria-live="polite" aria-label="Chat messages">

      <div class="date-divider">Today</div>

      <!-- Welcome message injected by JS -->

    </section>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typing-indicator" aria-label="Coach is typing">
      <span class="typing-label">Coach</span>
      <div class="typing-dots">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <!-- Quick-question suggestions -->
    <div class="suggestions" id="suggestions" aria-label="Suggested questions">
      <button class="suggestion-chip" data-q="How did my training go this week?">This week's training</button>
      <button class="suggestion-chip" data-q="How did my most recent long run go?">Last long run</button>
      <button class="suggestion-chip" data-q="What's my average pace trending over the last month?">Pace trends</button>
      <button class="suggestion-chip" data-q="Am I showing any signs of overtraining?">Overtraining check</button>
      <button class="suggestion-chip" data-q="What's my current form and fatigue? Show my training load.">Form &amp; fatigue</button>
      <button class="suggestion-chip" data-q="What should my next workout focus on?">Next workout</button>
      <button class="suggestion-chip" data-q="How's my weekly mileage looking?">Weekly mileage</button>
    </div>

    <!-- Input bar -->
    <div class="chat-input-bar">
      <span class="chat-input-prompt" aria-hidden="true">&gt;</span>
      <div class="chat-input-wrap">
        <textarea
          id="chat-input"
          placeholder="ask your coach…"
          rows="1"
          aria-label="Message"
          maxlength="500"
        ></textarea>
      </div>
      <button class="btn-send" id="send-btn" disabled aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

  </div><!-- /chat-layout -->

  <script src="/js/vdot.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
